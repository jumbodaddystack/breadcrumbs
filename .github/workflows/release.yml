name: release

# Publishes the Breadcrumbs package (PyPI name: crumb-kit) to PyPI via Trusted Publishing (OIDC) — no API tokens
# are stored anywhere in this repo. Both triggers publish to real PyPI:
#
#   * workflow_dispatch  -> manual build, validate, and publish to PyPI.
#   * release published  -> build, validate, and publish to PyPI.
#
# One-time setup on PyPI, done once before the first run:
#   1. Create the project's "pending publisher" at
#        https://pypi.org/manage/account/publishing/
#      with: owner = jumbodaddystack, repo = breadcrumbs,
#             workflow = release.yml, environment = pypi.
#   2. That's it — no secrets. OIDC mints a short-lived token per run.
#
# The build/check job mirrors the `package` job in ci.yml so a release can never
# ship an artifact CI would have rejected (bundled templates, installed-binary
# smoke test, twine metadata check).

on:
  workflow_dispatch:        # manual -> PyPI
  release:
    types: [published]      # GitHub release -> PyPI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build twine
          python -m build

      - name: Validate metadata (twine check)
        run: python -m twine check dist/*

      - name: Bundled templates present in the wheel (18 files incl. 5 .gitkeep)
        run: |
          WHEEL="$(ls dist/crumb_kit-*.whl)"
          n_tmpl="$(python -m zipfile -l "$WHEEL" | grep -c 'breadcrumbs/templates/project-memory/')"
          n_keep="$(python -m zipfile -l "$WHEEL" | grep -c '\.gitkeep')"
          echo "template entries: $n_tmpl ; .gitkeep entries: $n_keep"
          test "$n_tmpl" -eq 18
          test "$n_keep" -eq 5

      - name: Installed-binary smoke test (mimics pipx)
        run: |
          python -m venv /tmp/cv
          /tmp/cv/bin/python -m pip install "$(ls dist/crumb_kit-*.whl)"
          /tmp/cv/bin/crumb --version | grep -E 'breadcrumbs [0-9]+\.[0-9]+\.[0-9]+ \(record schema_version [0-9]+\)'
          WORK="$(mktemp -d)"; cd "$WORK"
          git init -q && git config user.email t@t.t && git config user.name t
          git commit -q --allow-empty -m init
          /tmp/cv/bin/crumb init --session-tracking full
          /tmp/cv/bin/crumb validate

      - name: Upload built distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    # Real publish, on both a manual dispatch and a published GitHub release.
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/crumb-kit
    permissions:
      id-token: write        # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
