name: release

# Publishes the Breadcrumbs package (PyPI name: crumb-kit) via Trusted Publishing (OIDC) — no API tokens
# are stored anywhere in this repo. The two triggers publish to different indexes
# (review #3 R6 — the manual trigger is the RELEASING.md dry-run and must never
# hit real PyPI):
#
#   * workflow_dispatch  -> manual build, validate, and publish to **TestPyPI**.
#   * release published  -> build, validate, and publish to **real PyPI**.
#
# One-time setup, done once before the first run:
#   1. Create the project's "pending publisher" at
#        https://pypi.org/manage/account/publishing/          (environment: pypi)
#      and its twin at
#        https://test.pypi.org/manage/account/publishing/     (environment: testpypi)
#      with: owner = jumbodaddystack, repo = breadcrumbs, workflow = release.yml.
#   2. That's it — no secrets. OIDC mints a short-lived token per run.
#
# The build/check job mirrors the `package` job in ci.yml so a release can never
# ship an artifact CI would have rejected (bundled templates, installed-binary
# smoke test, twine metadata check).

on:
  workflow_dispatch:        # manual -> TestPyPI (dry-run)
  release:
    types: [published]      # GitHub release -> real PyPI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build twine
          python -m build

      - name: Validate metadata (twine check)
        run: python -m twine check dist/*

      # Identity check against the tracked source tree — no duplicated magic
      # counts to keep in sync across workflows (review #3 R18).
      - name: Bundled templates match the tracked source tree
        run: |
          WHEEL="$(ls dist/crumb_kit-*.whl)"
          python - "$WHEEL" <<'PY'
          import subprocess, sys, zipfile
          wheel = sys.argv[1]
          src = set(subprocess.run(
              ["git", "ls-files", "breadcrumbs/templates/project-memory"],
              capture_output=True, text=True, check=True,
          ).stdout.split())
          bundled = {n for n in zipfile.ZipFile(wheel).namelist()
                     if n.startswith("breadcrumbs/templates/project-memory/")}
          assert src, "no template files tracked in git?"
          missing = src - bundled
          extra = bundled - src
          assert not missing, f"templates missing from wheel: {sorted(missing)}"
          assert not extra, f"unexpected wheel template entries: {sorted(extra)}"
          print(f"all {len(src)} tracked template files bundled, no extras.")
          PY

      - name: Installed-binary smoke test (mimics pipx)
        run: |
          python -m venv /tmp/cv
          /tmp/cv/bin/python -m pip install "$(ls dist/crumb_kit-*.whl)"
          /tmp/cv/bin/crumb --version | grep -E 'breadcrumbs [0-9]+\.[0-9]+\.[0-9]+ \(record schema_version [0-9]+\)'
          WORK="$(mktemp -d)"; cd "$WORK"
          git init -q && git config user.email t@t.t && git config user.name t
          git commit -q --allow-empty -m init
          /tmp/cv/bin/crumb init --session-tracking full
          /tmp/cv/bin/crumb validate

      - name: Upload built distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    # Dry-run publish (RELEASING.md "Dry-run on TestPyPI first"): manual
    # dispatch only, never triggered by a GitHub release.
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/crumb-kit
    permissions:
      id-token: write        # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/

  publish-pypi:
    # Real publish: only on a published GitHub release.
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/crumb-kit
    permissions:
      id-token: write        # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
